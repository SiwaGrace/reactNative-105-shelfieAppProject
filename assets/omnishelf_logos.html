<style>
  .logos-wrap {
    font-family: var(--font-sans);
    padding: 1rem 0;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .logo-panel {
    /* border-radius: 20px; */
    padding: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .dark-panel {
    background: #1a1025;
  }
  .light-panel {
    background: #f0edf7;
  }
  .tag {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .dark-tag {
    color: #7c6f96;
  }
  .light-tag {
    color: #7c6f96;
  }
  .panel-wrap {
    display: flex;
    flex-direction: column;
  }
</style>

<div class="logos-wrap">
  <div style="display: flex; gap: 16px; align-items: flex-start">
    <div class="panel-wrap">
      <p class="tag dark-tag">Dark theme</p>
      <div class="logo-panel dark-panel">
        <svg
          width="260"
          height="156"
          viewBox="0 0 260 56"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <defs>
            <linearGradient id="grad-dark" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#7c3aed" />
              <stop offset="100%" stop-color="#ec4899" />
            </linearGradient>
            <linearGradient id="shelf-dark" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#a855f7" />
              <stop offset="100%" stop-color="#7c3aed" />
            </linearGradient>
          </defs>

          <!-- Icon mark: stylized shelf with stacked items -->
          <!-- shelf base -->
          <rect
            x="4"
            y="42"
            width="44"
            height="4"
            rx="2"
            fill="url(#grad-dark)"
          />
          <!-- book 1 - tall -->
          <rect
            x="6"
            y="18"
            width="8"
            height="24"
            rx="2"
            fill="#7c3aed"
            opacity="0.9"
          />
          <!-- book 2 - medium -->
          <rect x="16" y="24" width="7" height="18" rx="2" fill="#a855f7" />
          <!-- book 3 - short -->
          <rect
            x="25"
            y="28"
            width="6"
            height="14"
            rx="2"
            fill="#ec4899"
            opacity="0.85"
          />
          <!-- play triangle (anime) -->
          <polygon
            points="35,22 35,36 46,29"
            fill="url(#grad-dark)"
            opacity="0.9"
          />
          <!-- tiny star (rating) -->
          <polygon
            points="28,12 29.5,16.5 34,16.5 30.5,19 31.8,23.5 28,21 24.2,23.5 25.5,19 22,16.5 26.5,16.5"
            fill="#eab308"
            transform="scale(0.55) translate(22,-8)"
          />

          <!-- Wordmark -->
          <text
            x="58"
            y="30"
            font-family="Georgia, serif"
            font-size="26"
            font-weight="700"
            letter-spacing="-0.5"
            fill="#e2d9f3"
          >
            omni
          </text>
          <text
            x="115"
            y="30"
            font-family="Georgia, serif"
            font-size="26"
            font-weight="700"
            letter-spacing="-0.5"
            fill="url(#grad-dark)"
          >
            shelf
          </text>

          <!-- tagline -->
          <text
            x="59"
            y="44"
            font-family="Arial, sans-serif"
            font-size="9.5"
            letter-spacing="2.5"
            fill="#7c6f96"
            font-weight="400"
          >
            MEDIA TRACKER
          </text>
        </svg>
      </div>
    </div>

    <div class="panel-wrap">
      <p class="tag light-tag">Light theme</p>
      <div class="logo-panel light-panel">
        <svg
          width="260"
          height="156"
          viewBox="0 0 260 56"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <defs>
            <linearGradient id="grad-light" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#7c3aed" />
              <stop offset="100%" stop-color="#ec4899" />
            </linearGradient>
            <linearGradient id="shelf-light" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#a855f7" />
              <stop offset="100%" stop-color="#6d28d9" />
            </linearGradient>
          </defs>

          <!-- shelf base -->
          <rect
            x="4"
            y="42"
            width="44"
            height="4"
            rx="2"
            fill="url(#grad-light)"
          />
          <!-- book 1 -->
          <rect
            x="6"
            y="18"
            width="8"
            height="24"
            rx="2"
            fill="#6d28d9"
            opacity="0.9"
          />
          <!-- book 2 -->
          <rect x="16" y="24" width="7" height="18" rx="2" fill="#7c3aed" />
          <!-- book 3 -->
          <rect
            x="25"
            y="28"
            width="6"
            height="14"
            rx="2"
            fill="#ec4899"
            opacity="0.9"
          />
          <!-- play triangle -->
          <polygon
            points="35,22 35,36 46,29"
            fill="url(#grad-light)"
            opacity="0.9"
          />
          <!-- star -->
          <polygon
            points="28,12 29.5,16.5 34,16.5 30.5,19 31.8,23.5 28,21 24.2,23.5 25.5,19 22,16.5 26.5,16.5"
            fill="#eab308"
            transform="scale(0.55) translate(22,-8)"
          />

          <!-- Wordmark -->
          <text
            x="58"
            y="30"
            font-family="Georgia, serif"
            font-size="26"
            font-weight="700"
            letter-spacing="-0.5"
            fill="#1e0f3a"
          >
            omni
          </text>
          <text
            x="115"
            y="30"
            font-family="Georgia, serif"
            font-size="26"
            font-weight="700"
            letter-spacing="-0.5"
            fill="url(#grad-light)"
          >
            shelf
          </text>

          <!-- tagline -->
          <text
            x="59"
            y="44"
            font-family="Arial, sans-serif"
            font-size="9.5"
            letter-spacing="2.5"
            fill="#7c6f96"
            font-weight="400"
          >
            MEDIA TRACKER
          </text>
        </svg>
      </div>
    </div>
  </div>

  <!-- icon only versions -->
  <div style="display: flex; gap: 16px; align-items: flex-start">
    <div class="panel-wrap" style="flex: 1">
      <p class="tag dark-tag">Icon only — dark</p>
      <div class="logo-panel dark-panel" style="padding: 32px">
        <svg
          width="56"
          height="76"
          viewBox="0 0 56 56"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <defs>
            <linearGradient id="icon-grad-d" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#7c3aed" />
              <stop offset="100%" stop-color="#ec4899" />
            </linearGradient>
          </defs>
          <rect width="56" height="56" rx="14" fill="#2d1f42" />
          <rect
            x="8"
            y="44"
            width="40"
            height="4"
            rx="2"
            fill="url(#icon-grad-d)"
          />
          <rect x="10" y="20" width="8" height="24" rx="2" fill="#7c3aed" />
          <rect x="20" y="26" width="7" height="18" rx="2" fill="#a855f7" />
          <rect x="29" y="30" width="6" height="14" rx="2" fill="#ec4899" />
          <polygon points="37,22 37,38 49,30" fill="url(#icon-grad-d)" />
          <circle cx="18" cy="13" r="4" fill="#eab308" opacity="0.9" />
        </svg>
      </div>
    </div>
    <div class="panel-wrap" style="flex: 1">
      <p class="tag light-tag">Icon only — light</p>
      <div class="logo-panel light-panel" style="padding: 32px">
        <svg
          width="56"
          height="76"
          viewBox="0 0 56 56"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <defs>
            <linearGradient id="icon-grad-l" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#7c3aed" />
              <stop offset="100%" stop-color="#ec4899" />
            </linearGradient>
          </defs>
          <rect width="56" height="56" rx="14" fill="#e8e3f2" />
          <rect
            x="8"
            y="44"
            width="40"
            height="4"
            rx="2"
            fill="url(#icon-grad-l)"
          />
          <rect x="10" y="20" width="8" height="24" rx="2" fill="#6d28d9" />
          <rect x="20" y="26" width="7" height="18" rx="2" fill="#7c3aed" />
          <rect x="29" y="30" width="6" height="14" rx="2" fill="#ec4899" />
          <polygon points="37,22 37,38 49,30" fill="url(#icon-grad-l)" />
          <circle cx="18" cy="13" r="4" fill="#eab308" opacity="0.9" />
        </svg>
      </div>
    </div>
  </div>
</div>
